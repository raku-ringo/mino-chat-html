<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>オセロ</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root{--bg:#fff;--line:#e9e9e9;--text:#111;--accent:#0b5fff}
    html,body{margin:0;padding:12px;background:var(--bg);font-family:"Noto Sans JP",sans-serif;color:var(--text)}
    .top{display:flex;gap:8px;align-items:center;margin-bottom:12px}
    .board{display:grid;grid-template-columns:repeat(8,44px);grid-template-rows:repeat(8,44px);gap:4px}
    .cell{width:44px;height:44px;background:#f7f7f7;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:4px}
    .disc{width:34px;height:34px;border-radius:50%}
    .black{background:#111}
    .white{background:#fff;border:1px solid #ccc}
    .info{margin-left:12px}
    .btn{background:var(--accent);color:#fff;padding:8px 10px;border-radius:6px;border:none;cursor:pointer}
    .small{color:#666;font-size:13px}
    .container{display:flex;gap:12px}
    @media(max-width:600px){ .board{transform:scale(0.9);transform-origin:left top} }
  </style>
</head>
<body>
  <div class="top">
    <div>
      <div style="font-weight:700">オセロ</div>
      <div class="small" id="roomLabel"></div>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <div class="small" id="playersLabel">プレイヤー: -</div>
      <button id="joinGameBtn" class="btn">対戦参加</button>
      <button id="newGameBtn" class="btn" style="background:#666">新しく作成</button>
    </div>
  </div>

  <div class="container">
    <div id="board" class="board" role="grid" aria-label="オセロ盤"></div>
    <div class="info">
      <div style="font-weight:700">情報</div>
      <div class="small" id="status">状態: -</div>
      <div class="small" id="turn">手番: -</div>
      <div class="small" id="counts">黒: 0 / 白: 0</div>
      <div style="height:12px"></div>
      <div><button id="passBtn" class="btn" style="background:#999">パス（自動判定）</button></div>
    </div>
  </div>

  <script>
    const BASE = 'https://studying-tt.onrender.com';
    const socket = io(BASE, { transports: ['websocket','polling'] });

    function qp(name){ const u = new URL(location.href); return u.searchParams.get(name); }
    const room = qp('room') || 'global';
    const username = qp('username') || '匿名';

    document.getElementById('roomLabel').textContent = `部屋: ${room}`;

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const turnEl = document.getElementById('turn');
    const countsEl = document.getElementById('counts');
    const playersLabel = document.getElementById('playersLabel');
    const joinGameBtn = document.getElementById('joinGameBtn');
    const newGameBtn = document.getElementById('newGameBtn');
    const passBtn = document.getElementById('passBtn');

    let game = null;
    let myColor = null;

    function buildBoard(){
      boardEl.innerHTML = '';
      for(let r=0;r<8;r++) for(let c=0;c<8;c++){
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.r = r; cell.dataset.c = c;
        cell.addEventListener('click', () => onCellClick(r,c));
        boardEl.appendChild(cell);
      }
    }

    function renderBoard(board){
      for(let r=0;r<8;r++) for(let c=0;c<8;c++){
        const idx = r*8 + c;
        const cell = boardEl.children[idx];
        cell.innerHTML = '';
        if(board[r][c] === 1){ const d = document.createElement('div'); d.className='disc black'; cell.appendChild(d); }
        else if(board[r][c] === 2){ const d = document.createElement('div'); d.className='disc white'; cell.appendChild(d); }
      }
    }

    function updateInfo(g){
      game = g;
      statusEl.textContent = `状態: ${g.status}`;
      turnEl.textContent = g.turn ? (g.turn===1 ? '黒' : '白') : '-';
      countsEl.textContent = `黒: ${g.counts ? g.counts.black : 0} / 白: ${g.counts ? g.counts.white : 0}`;
      const p1 = g.players && g.players[1] ? g.players[1] : '-';
      const p2 = g.players && g.players[2] ? g.players[2] : '-';
      playersLabel.textContent = `黒: ${p1} / 白: ${p2}`;
      if (g.players) {
        if (g.players[1] === username) myColor = 1;
        else if (g.players[2] === username) myColor = 2;
        else myColor = null;
      }
      renderBoard(g.board);
    }

    function onCellClick(r,c){
      if(!game || game.status !== 'playing') return;
      if(!myColor){ alert('まず「対戦参加」を押して色を割り当ててください'); return; }
      if(game.turn !== myColor){ alert('あなたの手番ではありません'); return; }
      socket.emit('makeMove', { roomId: room, r, c, color: myColor });
    }

    joinGameBtn.addEventListener('click', () => socket.emit('joinGame', { roomId: room, username }));
    newGameBtn.addEventListener('click', () => socket.emit('createGame', { roomId: room }));
    passBtn.addEventListener('click', () => alert('パスはサーバーが自動判定します。合法手がない場合は自動でパスされます。'));

    socket.on('connect', () => {
      socket.emit('joinRoom', { roomId: room, username });
      socket.emit('requestGameState', { roomId: room });
    });

    socket.on('gameState', (g) => updateInfo(g));
    socket.on('roomUpdate', ({ players }) => { playersLabel.textContent = `参加者: ${players.join(', ')}`; });

    buildBoard();
  </script>
</body>
</html>
